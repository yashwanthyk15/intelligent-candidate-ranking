# AI tools declaration
ai_tools_used:
  - "ChatGPT / Claude / Antigravity"

ai_usage_summary: |
  Used Claude/Antigravity for autocomplete and brainstorming scoring heuristics.
  No candidate data was fed to any hosted LLM. The ranking pipeline is pure
  Python with zero external API calls.

# Approach summary
methodology_summary: |
  Rule-based ranker with 6 weighted scoring dimensions: tech depth
  (5 core domain coverage, 35%), shipped systems evidence (career history NLP, 25%),
  BM25 text relevance (Okapi BM25 against JD terms, 10%),
  behavioral availability (10%), experience trajectory (10%), and location fit (10%).
  Multiplicative penalties for keyword stuffing and profile contradictions.
  Honeypot detector with targeted heuristics (F-tier title + zero ML evidence,
  keyword stuffing, academic-only, LLM-tourist, architect-no-code).
  Zero external dependencies. Runtime: ~90s for 100K candidates on CPU.

