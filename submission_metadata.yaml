  pre_computation_time_minutes: 0

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "ChatGPT / Copilot"

ai_usage_summary: |
  Used standard tools (ChatGPT/Copilot) strictly as intelligent autocomplete and for 
  brainstorming algorithmic approaches (like BM25 optimization). No candidate data 
  was fed to any hosted LLM. The ranking pipeline itself is pure Python with zero 
  external API calls — all scoring logic, weights, and engineering design were 
  human-driven.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based ranker with 6 weighted scoring dimensions: role alignment (title
  tiering), shipped systems evidence (career history NLP), technical depth
  (5 core domain coverage), experience trajectory, behavioral availability,
  and location fit. Multiplicative penalties for keyword stuffing and
  profile contradictions. Separate honeypot detector using 5 heuristics
  (expert-zero-duration, junior-many-experts, career anomalies, assessment
  contradictions, endorsement anomalies). Zero external dependencies.
  Runtime: ~85 seconds for 100K candidates on CPU.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
